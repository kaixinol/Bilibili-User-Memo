<div
  x-data="${appName}"
  class="debugger-window"
>
  <div
    class="debugger-header"
    data-drag-region
    @pointerdown="onPointerDown($event)"
  >
    <span class="drag-handle" data-drag-handle>⠿</span>
    <span class="debugger-title">Bilibili Debugger</span>
  </div>

  <div class="debugger-content">
    <section class="debugger-perf" title="当前页面性能诊断">
      <div class="perf-item">
        <span class="perf-label">FPS</span>
        <span class="perf-value" x-text="perf.fps"></span>
      </div>
      <div class="perf-item">
        <span class="perf-label">Long/s</span>
        <span class="perf-value" x-text="perf.longTasks"></span>
      </div>
      <div class="perf-item perf-item-wide">
        <span class="perf-label">Heap</span>
        <span class="perf-value" x-text="perf.memory"></span>
      </div>
    </section>

    <section class="debugger-controls">
      <input
        x-model="selector"
        @keydown.enter="scan"
        type="text"
        class="debugger-input"
        placeholder="输入 CSS selector..."
      />
      <input
        x-model="color"
        @input.debounce.100ms="scan"
        type="color"
        class="debugger-color-picker"
        title="高亮颜色"
      />
      <button @click="scan" class="debugger-btn">扫描</button>
      <button @click="clearHighlights" class="debugger-btn">清除</button>
    </section>

    <div class="debugger-scroll">
      <section class="debugger-section">
        <div class="debugger-section-title">
          <span>Selector</span>
          <span
            class="debugger-section-meta"
            x-text="selectorError || `${selectorMatchCount} visible`"
          ></span>
        </div>
      </section>

      <section class="debugger-section">
        <div class="debugger-section-title">
          <span>慢规则</span>
          <span class="debugger-section-meta" x-text="`${perf.slowRules.length} items`"></span>
        </div>
        <template x-if="perf.slowRules.length === 0">
          <div class="debugger-empty">暂无慢规则</div>
        </template>
        <template x-for="rule in perf.slowRules" :key="rule.id">
          <div class="perf-row" :class="{ 'perf-row-slow': rule.slow }">
            <div class="perf-row-main">
              <span class="perf-row-title" x-text="rule.ruleName"></span>
              <span class="perf-row-badge" x-text="rule.mode"></span>
              <span class="perf-row-total" x-text="totalRuleMs(rule)"></span>
            </div>
            <div class="perf-row-sub">
              <span x-text="`scan ${formatMs(rule.scanMs)}`"></span>
              <span x-text="`query ${formatMs(rule.queryMs)}`"></span>
              <span x-text="`apply ${rule.applyCount}/${formatMs(rule.applyMs)}`"></span>
              <span x-text="`${rule.matchCount} hits`"></span>
            </div>
            <div class="perf-row-selector" x-text="rule.selector"></div>
          </div>
        </template>
      </section>

      <section class="debugger-section">
        <div class="debugger-section-title">
          <span>卡顿事件</span>
          <span class="debugger-section-meta" x-text="`${perf.longTaskEvents.length} recent`"></span>
        </div>
        <template x-if="perf.longTaskEvents.length === 0">
          <div class="debugger-empty">暂无 long task</div>
        </template>
        <template x-for="task in perf.longTaskEvents" :key="task.id">
          <div class="perf-row" :class="{ 'perf-row-slow': task.relatedKind !== 'unrelated' }">
            <div class="perf-row-main">
              <span class="perf-row-title" x-text="formatTime(task.time)"></span>
              <span class="perf-row-badge" x-text="task.relatedKind"></span>
              <span class="perf-row-total" x-text="formatMs(task.durationMs)"></span>
            </div>
            <div
              class="perf-row-sub"
              x-text="`${task.relatedFlow}${task.relatedDeltaMs !== undefined ? ` / ${task.relatedDeltaMs}ms from long task` : ''}`"
            ></div>
          </div>
        </template>
      </section>

      <section class="debugger-section">
        <div class="debugger-section-title">
          <span>最近流程</span>
          <span class="debugger-section-meta" x-text="`${perf.recentFlows.length} recent`"></span>
        </div>
        <template x-if="perf.recentFlows.length === 0">
          <div class="debugger-empty">暂无流程数据</div>
        </template>
        <template x-for="flow in perf.recentFlows" :key="flow.id">
          <div class="perf-row" :class="{ 'perf-row-slow': flow.slow }">
            <div class="perf-row-main">
              <span class="perf-row-title" x-text="flow.source"></span>
              <span class="perf-row-badge" x-text="flow.mode || flow.scopeType || '-'"></span>
              <span class="perf-row-total" x-text="formatMs(flow.durationMs)"></span>
            </div>
            <div
              class="perf-row-sub"
              x-text="[flow.ruleName, flow.scopeType, flow.ruleCount ? `${flow.ruleCount} rules` : '', flow.chunked ? 'chunked' : ''].filter(Boolean).join(' / ')"
            ></div>
          </div>
        </template>
      </section>

      <section class="debugger-section">
        <div class="debugger-section-title">
          <span>QueryDOM</span>
          <span class="debugger-section-meta" x-text="`${perf.recentQueries.length} kept`"></span>
        </div>
        <template x-if="perf.recentQueries.length === 0">
          <div class="debugger-empty">暂无 deep query 数据</div>
        </template>
        <template x-for="query in perf.recentQueries" :key="query.id">
          <div class="perf-row" :class="{ 'perf-row-slow': query.slow }">
            <div class="perf-row-main">
              <span class="perf-row-title" x-text="query.caller"></span>
              <span class="perf-row-badge" x-text="query.kind"></span>
              <span class="perf-row-total" x-text="formatMs(query.durationMs)"></span>
            </div>
            <div class="perf-row-sub">
              <span x-text="query.scopeType"></span>
              <span x-text="`${query.matchCount} hits`"></span>
              <span x-text="query.error || ''"></span>
            </div>
            <div class="perf-row-selector" x-text="query.selector"></div>
          </div>
        </template>
      </section>

      <section class="debugger-section">
        <div class="debugger-section-title">
          <span>当前规则</span>
          <span class="debugger-section-meta" x-text="`${rules.length} matched`"></span>
        </div>
        <template x-if="rules.length === 0">
          <div class="debugger-empty">当前 URL 没有匹配规则</div>
        </template>
        <template x-for="r in rules" :key="r.id">
          <div class="rule-item" :class="{ 'rule-expanded': expandedRuleId === r.id }">
            <div class="rule-summary">
              <button
                class="rule-expand-btn"
                :class="{ 'rule-expanded-btn': expandedRuleId === r.id }"
                @click="toggleExpand(r.id)"
              >▼</button>
              <span
                class="rule-mode-badge"
                :title="injectModeLabel(r.mode)"
                x-text="injectModeLabel(r.mode).charAt(0)"
              ></span>
              <span class="rule-name" x-text="r.name"></span>
              <span class="rule-count" :class="{ 'rule-count-error': r.error }" x-text="r.error || `${r.matchCount}`"></span>
            </div>
            <template x-if="expandedRuleId === r.id">
              <div class="rule-details">
                <div class="rule-detail-row">
                  <label>Mode</label>
                  <span class="rule-mode-label" x-text="injectModeLabel(r.mode)"></span>
                </div>
                <div class="rule-detail-row">
                  <label>Scope</label>
                  <span class="rule-mode-label" x-text="styleScopeLabel(r.styleScope)"></span>
                </div>
                <div class="rule-detail-row">
                  <label>Selector</label>
                  <code class="debugger-code" x-text="r.selector"></code>
                </div>
                <template x-if="r.trigger">
                  <div class="rule-detail-row">
                    <label>Trigger</label>
                    <code class="debugger-code" x-text="r.trigger"></code>
                  </div>
                </template>
              </div>
            </template>
          </div>
        </template>
      </section>
    </div>
  </div>
</div>
