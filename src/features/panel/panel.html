<div
  x-data="panelShell"
  x-init="init()"
  x-show="true"
  class="panel-container"
  :class="{ open: isOpen, closed: !isOpen }"
  @keydown.window="handleSelectAll($event)"
  x-cloak
>
  <div class="panel-inner" x-data="panelSettings">
    <button
      class="panel-toggle-btn"
      title="右键点击修改文本~"
      x-data="panelToggleBtn"
      @click="togglePanel()"
      @contextmenu.prevent="editToggleText()"
      x-text="isOpen ? openText : closeText"
      :style="isOpen ? 'opacity: 1;' : 'opacity: 0.3;'"
    ></button>
    <div class="panel-mode-section">
      <div class="panel-mode-label">昵称显示模式：</div>
      <template x-for="mode in displayModes" :key="mode.value">
        <div class="panel-mode-option">
          <input
            type="radio"
            name="memoMode"
            :value="mode.value"
            :id="`panel-memo-mode-${mode.value}`"
            x-model.number="displayModeProxy"
          />
          <label :for="`panel-memo-mode-${mode.value}`" x-text="mode.label"></label>
        </div>
      </template>

      <div class="panel-right-actions">
        <label
          class="panel-custom-color-setting"
          @click="closeAdvancedCss()"
          @contextmenu="handleColorSettingContextMenu($event)"
          @mousedown="handleColorSettingMouseDown($event)"
        >
          <span
            class="setting-text"
            title="左键自定义颜色&#10;右键自定义样式&#10;中键清除自定义样式"
            >自定义备注颜色</span
          >
          <div 
            class="color-preview"
            @click.stop="$refs.panelColorInput?.click()"
          ></div>

          <input
            x-ref="panelColorInput"
            type="color"
            class="ghost-color-picker"
            x-model="customFontColor"
            @input.debounce.100ms="onCustomColorInput()"
          />
        </label>
      </div>
      <div class="panel-theme-toggle" @click="toggleTheme()">
        <svg
          x-show="!isDark"
          alt="sun"
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="12" cy="12" r="4" />
          <path d="M12 2v2" />
          <path d="M12 20v2" />
          <path d="m4.93 4.93 1.41 1.41" />
          <path d="m17.66 17.66 1.41 1.41" />
          <path d="M2 12h2" />
          <path d="M20 12h2" />
          <path d="m6.34 17.66-1.41 1.41" />
          <path d="m19.07 4.93-1.41 1.41" />
        </svg>
        <svg
          x-show="isDark"
          alt="moon"
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M20.985 12.486a9 9 0 1 1-9.473-9.472c.405-.022.617.46.402.803a6 6 0 0 0 8.268 8.268c.344-.215.825-.004.803.401"
          />
        </svg>
      </div>
    </div>

    <div class="panel-control-bar" x-data="panelActions">
      <button x-bind="panelImportBtn">导入</button>
      <button class="panel-btn" @click="$store.addUserDialog.open()">添加</button>
      <button x-bind="panelMultiSelectBtn">
        <span x-show="!userList.isMultiSelect">多选用户</span>
        <span x-show="userList.isMultiSelect">退出多选</span>
      </button>
      <button
        class="panel-icon-btn"
        x-show="userList.isMultiSelect"
        x-transition.opacity.scale
        :disabled="userList.selectedIds.length === 0"
        @click="confirmRemoveSelected()"
        title="删除所选用户"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M10 11v6" />
          <path d="M14 11v6" />
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" />
          <path d="M3 6h18" />
          <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
        </svg>
        <span class="panel-icon-text" x-show="userList.isMultiSelect"
          >已选 <span x-text="userList.selectedIds.length"></span
        ></span>
      </button>
      <div class="panel-title">备注列表</div>
      <button x-bind="panelRefreshBtn">
        <span x-show="!userList.isRefreshing && (!userList.isMultiSelect || userList.selectedIds.length === 0)">⚡一键刷新数据</span>
        <span x-show="!userList.isRefreshing && userList.isMultiSelect && userList.selectedIds.length > 0">⚡刷新所选</span>

        <span x-show="userList.isRefreshing" class="refresh-content">
          <span class="loading-spinner">⏳</span>
          正在刷新 (<span x-text="userList.refreshCurrent"></span>/<span
            x-text="userList.refreshTotal"
          ></span
          >)
        </span>
      </button>
      <div class="panel-search-box">
        <input
          id="searchInput"
          placeholder="搜索昵称、备注或ID..."
          class="panel-search-input"
          x-model.debounce.200ms="userList.searchQuery"
        />
        <button x-bind="panelSearchClearBtn" x-transition.opacity>
          ×
        </button>
      </div>
      <label class="panel-fuzzy-search-toggle" title="模糊匹配：支持子序列/部分匹配">
        <input
          type="checkbox"
          :checked="fuzzySearchEnabled"
          @change="toggleFuzzySearch($event)"
        />
        <span>模糊搜索</span>
      </label>
      <button x-bind="panelExportBtn">导出</button>
    </div>

    <dialog
      x-ref="memoCssDialog"
      class="panel-custom-css-section"
      x-effect="syncAdvancedCssDialog()"
      @close="closeAdvancedCss()"
      @click.self="closeAdvancedCss()"
    >
      <div class="panel-custom-css-header">
        <div class="panel-custom-css-title">自定义备注样式（CSS）</div>
        <button
          type="button"
          class="panel-custom-css-close"
          @click="closeAdvancedCss()"
          aria-label="关闭自定义备注样式"
        >
          &times;
        </button>
      </div>
      <textarea
        x-ref="memoCssInput"
        class="panel-custom-css-input"
        x-model="customMemoCss"
        @input.debounce.700ms="applyMemoCss()"
        @blur="applyMemoCss()"
        placeholder="示例：&#10;.bili-memo-tag {&#10;&#32;&#32;font-style: italic;&#10;&#32;&#32;letter-spacing: 0.5px;&#10;}&#10;.editable-textarea {&#10;&#32;&#32;background: rgba(0,0,0,0.08);&#10;&#32;&#32;border-bottom: 2px solid currentColor;&#10;}"
      ></textarea>
      <div
        class="panel-custom-css-status"
        x-show="cssStatus"
        x-transition.opacity
        role="status"
        aria-live="polite"
        x-text="cssStatus"
      ></div>
      <div class="panel-custom-css-hint">
        这里支持完整 CSS 选择器。只影响备注相关元素时，建议用 .bili-memo-tag /
        .editable-textarea / .bili-memo-input
      </div>
    </dialog>

    <div class="panel-users-container">
      <div>
        <div
          x-show="$store.userList.isOpen && $store.userList.isUsersLoading"
          class="panel-loading-state"
        >
          加载中...
        </div>
        <div
          x-show="$store.userList.hasLoadedUsers"
          class="panel-users-list"
        >
          <template x-for="user in $store.userList.filteredUsers" :key="user.id">
            ${boxTemplate}
          </template>

          <div x-show="$store.userList.filteredUsers.length === 0" class="panel-empty-state">
            没有找到用户
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 添加用户对话框 -->
<dialog
  x-data
  class="add-user-dialog"
  :open="$store.addUserDialog.isOpen"
  @keydown.escape.window="$store.addUserDialog.close()"
>
  <div class="add-user-dialog-backdrop" @click.self="$store.addUserDialog.close()">
    <div class="add-user-dialog-content">
      <div class="add-user-dialog-header">
        <h3>添加用户</h3>
        <button
          type="button"
          class="add-user-dialog-close"
          @click="$store.addUserDialog.close()"
        >
          &times;
        </button>
      </div>
      <form class="add-user-dialog-form" @submit.prevent="$store.addUserDialog.submit()">
        <div class="add-user-dialog-body">
          <div class="add-user-field">
            <label for="add-user-uid">UID <span class="required">*</span></label>
            <input
              id="add-user-uid"
              type="text"
              inputmode="numeric"
              pattern="[0-9]+"
              title="UID 只能包含数字"
              required
              x-model.trim="$store.addUserDialog.uid"
              placeholder="请输入用户 UID"
              :disabled="$store.addUserDialog.isLoading"
            />
          </div>
          <div class="add-user-field">
            <label for="add-user-memo">备注 <span class="required">*</span></label>
            <input
              id="add-user-memo"
              type="text"
              pattern=".*\S.*"
              title="请输入备注"
              required
              x-model.trim="$store.addUserDialog.memo"
              placeholder="请输入备注（必填）"
              :disabled="$store.addUserDialog.isLoading"
            />
          </div>
          <div class="add-user-field">
            <label for="add-user-avatar">头像 URL（可选）</label>
            <input
              id="add-user-avatar"
              type="text"
              x-model.trim="$store.addUserDialog.avatar"
              placeholder="留空将自动获取头像"
              :disabled="$store.addUserDialog.isLoading"
            />
          </div>
        </div>
        <div class="add-user-dialog-footer">
          <button
            type="submit"
            class="panel-btn add-user-submit"
            :disabled="$store.addUserDialog.isLoading"
          >
            <span x-show="$store.addUserDialog.isLoading">添加中...</span>
            <span x-show="!$store.addUserDialog.isLoading">添加</span>
          </button>
          <button
            type="button"
            class="panel-btn panel-btn-secondary"
            @click="$store.addUserDialog.close()"
          >
            取消
          </button>
        </div>
      </form>
    </div>
  </div>
</dialog>
